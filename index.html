<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTODANCE SHARE ONLINE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --primary: #ff4d4d;
            --secondary: #ffbb33;
            --accent: #00f2ff;
            --glass: rgba(0, 0, 0, 0.75);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            /* Fundo melhorado com overlay para destacar o neon */
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%), 
                        url('IMG_2223.jpeg') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 0;
            color: #fff;
            min-height: 100vh;
        }

        /* Header Estilo Just Dance */
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0; z-index: 1000;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.5);
        }

        header h1 {
            font-weight: 900; font-size: 1.6em;
            background: linear-gradient(to right, #ff4d4d, #ffbb33, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: 1px;
        }

        #hamburger {
            width: 30px; height: 20px; cursor: pointer;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        #hamburger div { height: 4px; background: var(--secondary); border-radius: 2px; box-shadow: 0 0 5px var(--secondary); }

        /* Cards e Layout */
        main { max-width: 850px; margin: 2em auto; padding: 0 20px; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h2 { color: var(--secondary); text-transform: uppercase; border-left: 5px solid var(--primary); padding-left: 15px; font-size: 1.2em; }

        /* Inputs e Botões */
        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: #fff;
            box-sizing: border-box; transition: 0.3s;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.15); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: 0.3s; width: 100%; text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.2); box-shadow: 0 5px 20px rgba(255, 77, 77, 0.5); }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }

        /* Feed de Posts */
        #posts { display: grid; grid-template-columns: 1fr; gap: 25px; }
        
        @media (min-width: 700px) { #posts { grid-template-columns: 1fr 1fr; } }

        .post {
            background: rgba(20, 20, 20, 0.9); border-radius: 18px; overflow: hidden;
            border: 1px solid #333; transition: 0.3s;
        }
        .post:hover { border-color: var(--accent); transform: scale(1.02); }
        .post.own { border: 2px solid var(--secondary); }

        .post-header { padding: 12px; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); }
        .post-header img { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--secondary); object-fit: cover; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .post-content { padding: 15px; }
        .tag-box {
            display: inline-block; background: rgba(0, 242, 255, 0.15);
            color: var(--accent); padding: 4px 10px; border-radius: 8px;
            font-size: 0.75em; margin: 0 5px 5px 0; font-weight: bold;
        }

        .social-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 12px; border-top: 1px solid #333; }
        .like-btn { background: none; width: auto; color: #888; display: flex; align-items: center; gap: 5px; font-size: 0.9em; padding: 0; }
        .like-btn.liked { color: var(--primary); }

        /* Menu Lateral */
        #menuContent {
            position: fixed; top: 0; right: -320px; width: 280px; height: 100%;
            background: rgba(0, 0, 0, 0.95); padding: 30px 20px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1001;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #menuContent.show { right: 0; }
        #menuOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000;
        }
        #menuOverlay.show { opacity: 1; pointer-events: auto; }

        #profileSection { text-align: center; }
        #profileSection img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid var(--secondary); margin-bottom: 15px; box-shadow: 0 0 20px var(--secondary); }
    </style>
</head>
<body>

<header>
    <h1>AUTODANCE <span style="font-weight:100">SHARE</span></h1>
    <div id="hamburger"><div></div><div></div><div></div></div>
</header>

<div id="menuOverlay"></div>
<div id="menuContent">
    <div id="profileSection">
        <img src="https://www.gravatar.com/avatar/0?d=mp" id="sideAvatar">
        <h3 id="sideName" style="color: var(--secondary); margin: 10px 0;">Dançarino</h3>
        <div id="sideXP" style="font-weight: bold; color: var(--accent);">XP: 0</div>
    </div>
    <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">
    <button id="logoutBtn" style="background: #222; border: 1px solid #444;">Sair da Conta</button>
</div>

<main>
    <section class="glass-card" id="loginBox">
        <h2>Acesso à Pista</h2>
        <input type="email" id="email" placeholder="Seu melhor e-mail">
        <input type="password" id="senha" placeholder="Sua senha secreta">
        <button id="loginBtn">Entrar / Criar Conta</button>
    </section>

    <section class="glass-card">
        <h2>Compartilhar Autodance</h2>
        <input type="text" id="author" placeholder="Seu nome no jogo" disabled>
        <input type="url" id="videoUrl" placeholder="Link do Vídeo (Streamable)" disabled>
        <input type="text" id="tags" placeholder="Tags: Just Dance 2024, Solo, Funk..." disabled>
        <button id="postBtn" disabled>Publicar na Rede</button>
    </section>

    <div style="margin-bottom: 25px;">
        <input type="text" id="searchInput" placeholder="🔍 Procurar por tag ou dançarino...">
    </div>

    <div id="posts"></div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, get, remove, runTransaction } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCA2XWZzavTNdHi_w8X5aASfBTfoLVsghY",
        authDomain: "auto-dance.firebaseapp.com",
        databaseURL: "https://auto-dance-default-rtdb.firebaseio.com",
        projectId: "auto-dance",
        storageBucket: "auto-dance.firebasestorage.app",
        messagingSenderId: "960760470726",
        appId: "1:960760470726:web:f5af55d01df6a2be0d4bc7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Elementos do DOM
    const emailInput = document.getElementById("email");
    const senhaInput = document.getElementById("senha");
    const loginBtn = document.getElementById("loginBtn");
    const authorInput = document.getElementById("author");
    const videoInput = document.getElementById("videoUrl");
    const tagsInput = document.getElementById("tags");
    const postBtn = document.getElementById("postBtn");
    const postsContainer = document.getElementById("posts");
    const sideAvatar = document.getElementById("sideAvatar");
    const sideName = document.getElementById("sideName");
    const sideXP = document.getElementById("sideXP");

    let currentUser = null;
    const defaultAvatar = "https://www.gravatar.com/avatar/0?d=mp";

    // --- AUTENTICAÇÃO ---
    loginBtn.onclick = async () => {
        const email = emailInput.value.trim();
        const senha = senhaInput.value.trim();
        if(!email || !senha) return alert("Ei! Preencha o login.");

        try {
            await signInWithEmailAndPassword(auth, email, senha);
        } catch (err) {
            try {
                await createUserWithEmailAndPassword(auth, email, senha);
            } catch (e) { alert("Erro: " + e.message); }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        const loggedIn = !!user;

        emailInput.disabled = loggedIn;
        senhaInput.disabled = loggedIn;
        loginBtn.disabled = loggedIn;
        authorInput.disabled = !loggedIn;
        videoInput.disabled = !loggedIn;
        tagsInput.disabled = !loggedIn;
        postBtn.disabled = !loggedIn;

        if (user) {
            // Monitorar dados do usuário
            onValue(ref(db, `users/${user.uid}`), snap => {
                const data = snap.val() || {};
                authorInput.value = data.name || "";
                if(data.name) authorInput.disabled = true;
                sideName.textContent = data.name || "Dançarino";
                sideAvatar.src = data.avatar || defaultAvatar;
                sideXP.textContent = `XP: ${data.xp || 0}`;
            });
            loadPosts();
        } else {
            postsContainer.innerHTML = "";
            sideName.textContent = "Visitante";
            sideAvatar.src = defaultAvatar;
            sideXP.textContent = "XP: 0";
        }
    });

    // --- POSTAGEM ---
    postBtn.onclick = async () => {
        const author = authorInput.value.trim();
        const video = videoInput.value.trim();
        const tags = tagsInput.value.split(",").map(t => t.trim()).filter(t => t);

        if (!author || !video.includes("streamable.com")) return alert("Nome obrigatório e o vídeo deve ser do Streamable!");

        // Registrar usuário no DB se for o primeiro post
        const userRef = ref(db, `users/${currentUser.uid}`);
        const snap = await get(userRef);
        if(!snap.exists()) {
            await set(userRef, { name: author, xp: 0, avatar: defaultAvatar });
        }

        const newPostRef = push(ref(db, "posts"));
        await set(newPostRef, {
            author, uid: currentUser.uid, video, tags,
            avatar: snap.val()?.avatar || defaultAvatar,
            timestamp: Date.now()
        });

        // Ganhar XP
        runTransaction(ref(db, `users/${currentUser.uid}/xp`), curr => (curr || 0) + 50);
        
        videoInput.value = ""; tagsInput.value = "";
        alert("Postado com sucesso!");
    };

    // --- CARREGAR FEED ---
    function loadPosts() {
        onValue(ref(db, "posts"), snap => {
            postsContainer.innerHTML = "";
            const data = snap.val();
            if (!data) return;

            Object.entries(data).reverse().forEach(([key, post]) => {
                const div = document.createElement("div");
                div.className = `post ${currentUser?.uid === post.uid ? 'own' : ''}`;
                
                div.innerHTML = `
                    <div class="post-header">
                        <img src="${post.avatar || defaultAvatar}">
                        <strong>${post.author}</strong>
                    </div>
                    <div class="video-container">
                        <iframe src="${post.video}" allowfullscreen></iframe>
                    </div>
                    <div class="post-content">
                        <div>${post.tags ? post.tags.map(t => `<span class="tag-box">${t}</span>`).join('') : ''}</div>
                        <div class="social-bar">
                            <button class="like-btn" id="like-${key}">
                                <i class="fa-regular fa-heart"></i> <span id="l-count-${key}">0</span>
                            </button>
                            <span style="font-size:0.8em; color:#666;" id="v-count-${key}">0 views</span>
                        </div>
                        ${currentUser?.uid === post.uid ? `<button onclick="deletePost('${key}')" style="margin-top:10px; padding:5px; background:red; font-size:0.7em;">Excluir</button>` : ''}
                    </div>
                `;
                postsContainer.appendChild(div);
                handleSocial(key);
            });
        });
    }

    // --- LIKES E VIEWS ---
    function handleSocial(postId) {
        const likeCountRef = ref(db, `likes/${postId}/count`);
        const userLikeRef = ref(db, `likes/${postId}/users/${currentUser?.uid}`);
        const viewRef = ref(db, `views/${postId}`);

        onValue(likeCountRef, s => document.getElementById(`l-count-${postId}`).textContent = s.val() || 0);
        onValue(viewRef, s => document.getElementById(`v-count-${postId}`).textContent = `${s.val() || 0} views`);

        if(currentUser) {
            const btn = document.getElementById(`like-${postId}`);
            onValue(userLikeRef, s => {
                if(s.val()) {
                    btn.classList.add("liked");
                    btn.querySelector("i").className = "fa-solid fa-heart";
                } else {
                    btn.classList.remove("liked");
                    btn.querySelector("i").className = "fa-regular fa-heart";
                }
            });

            btn.onclick = async () => {
                const s = await get(userLikeRef);
                const active = s.val();
                set(userLikeRef, !active);
                runTransaction(likeCountRef, c => active ? (c || 1) - 1 : (c || 0) + 1);
            };
        }

        // Simulação de view
        if(!sessionStorage.getItem('v_'+postId)) {
            runTransaction(viewRef, c => (c || 0) + 1);
            sessionStorage.setItem('v_'+postId, true);
        }
    }

    // --- UTILITÁRIOS ---
    window.deletePost = (key) => confirm("Apagar esse vídeo?") && remove(ref(db, `posts/${key}`));

    document.getElementById("hamburger").onclick = () => {
        document.getElementById("menuContent").classList.toggle("show");
        document.getElementById("menuOverlay").classList.toggle("show");
    };

    document.getElementById("menuOverlay").onclick = () => {
        document.getElementById("menuContent").classList.remove("show");
        document.getElementById("menuOverlay").classList.remove("show");
    };

    document.getElementById("logoutBtn").onclick = () => signOut(auth);

    document.getElementById("searchInput").oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll(".post").forEach(p => {
            p.style.display = p.textContent.toLowerCase().includes(val) ? "" : "none";
        });
    };
</script>

</body>
</html>
